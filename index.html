<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lava Lamp Simulator</title>
    <style>
      :root {
        --bg-1: #efe7d9;
        --bg-2: #d5c9b7;
        --frame: #2f2a24;
        --glass: rgba(255, 255, 255, 0.4);
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: "Georgia", "Times New Roman", serif;
        background: radial-gradient(circle at 20% 10%, var(--bg-1), var(--bg-2));
        display: grid;
        place-items: center;
      }

      .stage {
        width: min(860px, 94vw);
        height: min(640px, 86vh);
        position: relative;
      }

      .lamp-frame {
        position: absolute;
        inset: 0;
        border: 6px solid var(--frame);
        border-radius: 26px;
        box-shadow: 0 28px 60px rgba(0,0,0,0.25);
        background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(0,0,0,0.06));
      }

      canvas {
        position: absolute;
        inset: 18px;
        width: calc(100% - 36px);
        height: calc(100% - 36px);
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(255,255,255,0.3), rgba(255,255,255,0.08));
        box-shadow: inset 0 0 30px rgba(255,255,255,0.35);
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="lamp-frame" aria-hidden="true"></div>
      <canvas id="lava" aria-label="Lava lamp simulation canvas"></canvas>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
